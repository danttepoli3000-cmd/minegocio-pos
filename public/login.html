<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Tiendita</title>
<link rel="stylesheet" href="style.css">

<script src="auth.js"></script>
</head>

<body>

<div class="container">

<div class="topbar">
    <h1>🛒 Mi Tiendita</h1>
    <button onclick="cerrarSesion()">Salir</button>
</div>

<div class="card">
    <h2>Agregar Producto</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="precio" type="number" placeholder="Precio">
    <input id="stock" type="number" placeholder="Stock">

    <button onclick="agregarProducto()">Agregar</button>
</div>

<div class="card">
    <h2>Inventario</h2>
    <input id="buscar" oninput="cargarProductos()" placeholder="Buscar">
    <div id="lista"></div>
</div>

<div class="card">
    <h2>Venta</h2>

    <p id="ventaProducto">Ninguno</p>
    <p id="ventaPrecio">$0</p>

    <input id="cantidadVenta" type="number" value="1">
    <input id="clientePaga" type="number">

    <p>Total: <span id="ventaTotal">$0</span></p>
    <p>Vuelto: <span id="vuelto">$0</span></p>

    <button onclick="confirmarVenta()">Vender</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
