<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Tiendita POS</title>
<link rel="stylesheet" href="style.css">

<script>
(function () {
    const token = localStorage.getItem("token");
    const rol = localStorage.getItem("rol");

    if (!token) {
        window.location.replace("login.html");
        return;
    }

    if (rol !== "admin") {
        alert("No autorizado");
        window.location.replace("login.html");
        return;
    }
})();
</script>

</head>

<body>

<div class="container">

    <div class="topbar">
        <h1>🛒 Mi Tiendita POS (ADMIN)</h1>
        <button class="logout" onclick="cerrarSesion()">Salir</button>
    </div>

    <div class="card">
        <h2>📦 Inventario</h2>
        <input id="buscar" type="text" placeholder="Buscar..." oninput="cargarProductos()">
        <div id="lista"></div>
    </div>

    <div class="card">
        <h2>🧾 Venta</h2>

        <p id="ventaProducto">Ninguno</p>
        <p id="ventaPrecio">$0</p>

        <input id="cantidadVenta" type="number" value="1">
        <input id="clientePaga" type="number">

        <p>Total: <span id="ventaTotal">$0</span></p>
        <p>Vuelto: <span id="vuelto">$0</span></p>

        <button onclick="confirmarVenta()">✅ Vender</button>
    </div>

    <div class="card">
        <h2>💰 Resumen</h2>
        <p>Ventas: <span id="totalVentas">0</span></p>
        <p>Total dinero: <b id="dineroTotal">$0</b></p>
    </div>

    <div class="card">
        <h2>📋 Historial</h2>
        <div id="historial">Sin ventas</div>

        <button onclick="exportarPDF()">📄 PDF</button>
        <button onclick="imprimirHistorial()">🖨️ Imprimir</button>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
