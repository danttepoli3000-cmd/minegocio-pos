<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Tiendita Admin POS</title>

<script>
(function () {
    const token = localStorage.getItem("token");
    const rol = localStorage.getItem("rol");

    if (!token) {
        window.location.replace("login.html");
        return;
    }

    if (rol !== "admin") {
        window.location.replace("login.html");
        return;
    }
})();
</script>

</head>

<body>

<h1>ADMIN PANEL</h1>

<button onclick="cerrarSesion()">Salir</button>

<input id="buscar" placeholder="Buscar..." oninput="cargarProductos()">

<div id="lista"></div>

<h3>Venta</h3>

<p id="ventaProducto"></p>
<p id="ventaTotal"></p>

<input id="cantidadVenta" type="number" value="1">
<input id="clientePaga" type="number">

<p id="vuelto"></p>

<button onclick="confirmarVenta()">Vender</button>

<hr>

<h3>Historial</h3>
<div id="historial"></div>

<script src="admin.js"></script>
function cerrarSesion() {
    localStorage.clear();
    window.location.replace("login.html");
}
</body>
</html>
